name: opengallery
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-opengallery}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: ghcr.io/nebbsie/opengallery-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3219
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-opengallery}
      WORKER_TOKEN: ${WORKER_TOKEN:-changeme}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3219:3219"
    volumes:
      - /var/log/opengallery:/var/log/opengallery

  worker:
    image: ghcr.io/nebbsie/opengallery-worker:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WORKER_TOKEN: ${WORKER_TOKEN:-changeme}
      API_URL: http://api:3219
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - /var/log/opengallery:/var/log/opengallery

  web:
    image: ghcr.io/nebbsie/opengallery-web:latest
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: production
      PORT: 4321
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
